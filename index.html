<!DOCTYPE html>
<html>
<head>
  <title>Faculty Feedback System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; background:#f5f7fa; }
    .card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    input, select, button { padding:8px; margin:5px; }
    button { cursor:pointer; background:#007bff; color:white; border:none; border-radius:5px;}
    .hidden { display:none; }
    .progress { font-weight:bold; color:green; }
  </style>
</head>

<body>

<h2>🎓 Faculty Feedback System</h2>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>Student Login</h3>
  <input id="roll" placeholder="Roll Number"><br>
  <input id="name" placeholder="Name"><br>
  <button onclick="login()">Login</button>
  <button onclick="showAdmin()">Admin</button>
</div>

<!-- FEEDBACK -->
<div id="feedback" class="hidden">
  <h3>Feedback Form</h3>
  <p id="progress" class="progress"></p>
  <div id="subjects"></div>
  <button onclick="submitFeedback()">Submit</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h3>Admin Dashboard</h3>
  <canvas id="chart"></canvas>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<script>

// ---------------- SAMPLE DATA ----------------
const students = [
  { roll:"1", name:"Pavan", section:"CSE 1", submitted:false },
  { roll:"2", name:"Ravi", section:"CSE 1", submitted:false }
];

const subjects = [
  { id:"sub1", name:"DS", faculty:"Dr A", section:"CSE 1" },
  { id:"sub2", name:"DBMS", faculty:"Dr B", section:"CSE 1" }
];

// ---------------- LOGIN ----------------
let currentStudent = null;
let responses = {};

function login(){
  const roll = document.getElementById("roll").value;
  const name = document.getElementById("name").value;

  const student = students.find(s => s.roll === roll && s.name === name);

  if(!student){
    alert("Invalid Login");
    return;
  }

  if(student.submitted){
    alert("Already Submitted!");
    return;
  }

  currentStudent = student;
  document.getElementById("login").classList.add("hidden");
  document.getElementById("feedback").classList.remove("hidden");

  loadSubjects();
}

// ---------------- LOAD SUBJECTS ----------------
function loadSubjects(){
  const container = document.getElementById("subjects");
  container.innerHTML = "";

  const secSubjects = subjects.filter(s => s.section === currentStudent.section);

  secSubjects.forEach(sub => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${sub.name} (${sub.faculty})</h4>
      ${ratingInputs(sub.id)}
      <textarea placeholder="Comment" onchange="saveComment('${sub.id}', this.value)"></textarea>
    `;

    container.appendChild(div);
  });

  updateProgress();
}

// ---------------- RATING INPUT ----------------
function ratingInputs(id){
  const fields = ["clarity","knowledge","interaction","punctuality","satisfaction"];

  return fields.map(f => `
    <label>${f}</label>
    <input type="number" min="1" max="5"
      onchange="saveRating('${id}','${f}',this.value)">
  `).join("<br>");
}

function saveRating(id, field, value){
  if(!responses[id]) responses[id] = { ratings:{} };
  responses[id].ratings[field] = Number(value);
  updateProgress();
}

function saveComment(id, value){
  if(!responses[id]) responses[id] = {};
  responses[id].comment = value;
}

// ---------------- PROGRESS ----------------
function updateProgress(){
  const total = subjects.filter(s => s.section === currentStudent.section).length;
  const completed = Object.keys(responses).length;

  document.getElementById("progress").innerText =
    `Progress: ${completed}/${total}`;
}

// ---------------- SUBMIT ----------------
function submitFeedback(){
  const total = subjects.filter(s => s.section === currentStudent.section).length;

  if(Object.keys(responses).length !== total){
    alert("Complete all subjects!");
    return;
  }

  const allData = JSON.parse(localStorage.getItem("feedback") || "[]");

  allData.push({
    student: currentStudent.roll,
    section: currentStudent.section,
    responses
  });

  localStorage.setItem("feedback", JSON.stringify(allData));

  currentStudent.submitted = true;

  alert("Submitted Successfully!");
  location.reload();
}

// ---------------- ADMIN ----------------
function showAdmin(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("admin").classList.remove("hidden");
  loadAnalytics();
}

// ---------------- ANALYTICS ----------------
function loadAnalytics(){
  const data = JSON.parse(localStorage.getItem("feedback") || "[]");

  let summary = {};

  data.forEach(entry => {
    Object.entries(entry.responses).forEach(([subId, res]) => {

      if(!summary[subId]){
        summary[subId] = { total:0, count:0 };
      }

      const avg = Object.values(res.ratings).reduce((a,b)=>a+b,0)/5;

      summary[subId].total += avg;
      summary[subId].count++;
    });
  });

  const labels = [];
  const values = [];

  Object.entries(summary).forEach(([k,v]) => {
    labels.push(k);
    values.push((v.total/v.count).toFixed(2));
  });

  new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels,
      datasets:[{ label:"Avg Rating", data:values }]
    }
  });
}

// ---------------- EXPORT CSV ----------------
function downloadCSV(){
  const data = JSON.parse(localStorage.getItem("feedback") || "[]");

  let csv = "Student,Subject,Avg\n";

  data.forEach(d => {
    Object.entries(d.responses).forEach(([sub,res]) => {
      const avg = Object.values(res.ratings).reduce((a,b)=>a+b,0)/5;
      csv += `${d.student},${sub},${avg}\n`;
    });
  });

  const blob = new Blob([csv], { type:"text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.csv";
  a.click();
}

</script>

</body>
</html>
